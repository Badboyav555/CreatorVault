<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - CreatorVault</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link rel="stylesheet" href="css/style.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/config.js"></script>
  <script src="js/supabase-client.js"></script>
</head>
<body>
  <div id="navbar-container"></div>
  
  <main>
    <div class="container" style="max-width: 500px; margin: 60px auto;">
      <div class="glass-card">
        <h2 class="text-center">Welcome Back</h2>
        <p class="text-center" style="color: #666; margin: 8px 0 24px;">Login to access premium content</p>
        
        <form id="loginForm">
          <div style="margin-bottom: 20px;">
            <label style="display: block; margin-bottom: 8px; font-weight: 500;">Email Address</label>
            <input type="email" id="email" required placeholder="hello@example.com">
          </div>
          
          <div style="margin-bottom: 20px;">
            <label style="display: block; margin-bottom: 8px; font-weight: 500;">Password</label>
            <input type="password" id="password" required placeholder="••••••••">
          </div>
          
          <div class="flex-between" style="margin-bottom: 24px;">
            <label>
              <input type="checkbox" id="remember"> Remember me
            </label>
            <a href="#" style="color: #EC4899; text-decoration: none;">Forgot password?</a>
          </div>
          
          <button type="submit" class="btn-primary" style="width: 100%; padding: 14px;">Login</button>
        </form>
        
        <p class="text-center" style="margin-top: 24px;">
          Don't have an account? <a href="register.html" style="color: #EC4899;">Sign up</a>
        </p>
      </div>
    </div>
  </main>
  
  <div id="footer-container"></div>
  
  <script>
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      
      const { error } = await supabaseClient.auth.signInWithPassword({ email, password });
      
      if (error) {
        showToast(error.message, 'error');
      } else {
        showToast('Login successful! Redirecting...', 'success');
        setTimeout(() => {
          window.location.href = 'dashboard.html';
        }, 1000);
      }
    });
  </script>
</body>
</html>
